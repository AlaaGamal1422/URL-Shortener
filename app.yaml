runtime: nodejs12
service: temp
instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 1

liveness_check:
  path: "/live"
  check_interval_sec: 30
  timeout_sec: 15
  failure_threshold: 2
  success_threshold: 2

readiness_check:
  path: "/ready"
  check_interval_sec: 5
  timeout_sec: 15
  failure_threshold: 2
  success_threshold: 2
  app_start_timeout_sec: 300

env_variables:
  NODE_ENV: development
